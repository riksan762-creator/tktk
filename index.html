<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Riksan Project | TikTok Downloader</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #c026d3 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .btn-gradient {
            background: linear-gradient(90deg, #6366f1, #d946ef);
            transition: all 0.3s ease;
        }

        .btn-gradient:active {
            transform: scale(0.98);
        }

        /* Responsive Fix for iPhone */
        @supports (-webkit-touch-callout: none) {
            .min-h-screen { min-height: -webkit-fill-available; }
        }
    </style>
</head>
<body class="flex flex-col items-center px-4 py-8">

    <div class="w-full max-w-lg space-y-6">
        
        <header class="text-center text-white pt-6">
            <h1 class="text-3xl font-extrabold tracking-tight">RIKSAN PROJECT</h1>
            <p class="text-white/80 text-sm mt-1">TikTok Downloader No Watermark</p>
        </header>

        <div class="glass-card p-6 shadow-xl">
            <div class="space-y-4">
                <div class="flex items-center bg-slate-100 border-2 border-slate-200 rounded-2xl px-4 py-1 focus-within:border-indigo-500">
                    <input type="text" id="tiktokUrl" placeholder="Tempel tautan video..." 
                        class="w-full bg-transparent py-4 text-slate-800 outline-none font-medium">
                    <button id="btnPaste" class="bg-indigo-100 text-indigo-700 px-3 py-2 rounded-xl text-xs font-bold active:bg-indigo-200">
                        TEMPEL
                    </button>
                </div>

                <button id="btnAction" class="btn-gradient w-full text-white font-bold py-5 rounded-2xl text-lg shadow-lg">
                    DOWNLOAD VIDEO
                </button>
            </div>
        </div>

        <div id="loader" class="hidden text-center py-4">
            <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-white border-r-transparent"></div>
            <p class="text-white text-xs font-bold mt-2 animate-pulse">MEMPROSES...</p>
        </div>

        <div id="result" class="hidden glass-card overflow-hidden animate-bounce-in">
            <img id="thumb" src="" class="w-full aspect-video object-cover">
            <div class="p-6 space-y-4">
                <div>
                    <h3 id="author" class="text-indigo-600 font-bold"></h3>
                    <p id="desc" class="text-slate-500 text-xs line-clamp-2 mt-1"></p>
                </div>
                <a id="downloadLink" href="#" class="btn-gradient block w-full text-white text-center font-bold py-4 rounded-xl shadow-lg">
                    SIMPAN VIDEO KE GALERI
                </a>
            </div>
        </div>

        <footer class="text-center text-white/50 text-[10px] font-bold tracking-[0.3em] pt-10">
            &copy; 2026 RIKSAN PROJECT • CTO EDITION
        </footer>
    </div>

    <script>
        const btnAction = document.getElementById('btnAction');
        const btnPaste = document.getElementById('btnPaste');
        const tiktokInput = document.getElementById('tiktokUrl');
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('result');
        const downloadBtn = document.getElementById('downloadLink');

        // FUNGSI BERSIHKAN URL (Fix NXDOMAIN)
        const getCleanUrl = (path) => {
            if (!path) return "";
            if (path.includes('https://')) {
                return path.substring(path.lastIndexOf('https://'));
            }
            return `https://www.tikwm.com${path}`;
        };

        // FITUR PASTE (Aman di Android & iPhone)
        btnPaste.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                tiktokInput.value = text;
            } catch (err) {
                tiktokInput.focus();
                alert("Silakan tempel manual, Bos (Klik tahan kotaknya).");
            }
        });

        // LOGIKA AMBIL DATA
        btnAction.addEventListener('click', async () => {
            const rawUrl = tiktokInput.value.trim();
            if (!rawUrl) return alert('Link-nya mana?');

            btnAction.disabled = true;
            btnAction.innerText = 'WAIT...';
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(rawUrl)}`);
                const json = await res.json();

                if (json.data) {
                    const v = json.data;
                    document.getElementById('thumb').src = getCleanUrl(v.cover);
                    document.getElementById('author').innerText = "@" + (v.author.nickname || "User");
                    document.getElementById('desc').innerText = v.title || "";
                    
                    // Pasang link video
                    downloadBtn.href = getCleanUrl(v.play);
                    resultArea.classList.remove('hidden');
                } else {
                    alert("Gagal ambil video!");
                }
            } catch (e) {
                alert("Koneksi Error!");
            } finally {
                btnAction.disabled = false;
                btnAction.innerText = 'DOWNLOAD VIDEO';
                loader.classList.add('hidden');
            }
        });

        // DOWNLOAD KE GALERI
        downloadBtn.addEventListener('click', async (e) => {
            // Untuk iPhone/Safari, kita biarkan browser menangani linknya
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                return true; 
            }

            // Untuk Android/Chrome, kita pakai Blob agar langsung download
            e.preventDefault();
            const url = downloadBtn.href;
            try {
                downloadBtn.innerText = "SEDANG MENGUNDUH...";
                const response = await fetch(url);
                const blob = await response.blob();
                const bUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = bUrl;
                a.download = `RiksanProject_${Date.now()}.mp4`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(bUrl);
            } catch (err) {
                window.open(url, '_blank');
            } finally {
                downloadBtn.innerText = "SIMPAN VIDEO KE GALERI";
            }
        });
    </script>
</body>
</html>
