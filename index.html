<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Riksan Project | TikTok Downloader</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --accent: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.3);
            --bg-dark: #020617;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(30, 58, 138, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .cyber-input {
            background: rgba(2, 6, 23, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .cyber-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-1px);
        }

        .cyber-btn {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cyber-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px var(--accent-glow);
            filter: brightness(1.1);
        }

        .fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full space-y-10 fade-up">
        
        <header class="text-center space-y-2">
            <h1 class="text-5xl font-extrabold tracking-tighter italic">
                <span class="text-white">RIKSAN</span><span class="text-cyan-400">PROJECT</span>
            </h1>
            <p class="text-slate-500 text-[10px] tracking-[0.5em] uppercase font-bold italic">Enterprise Video Solution</p>
        </header>

        <main class="glass-card p-8 rounded-[3rem] space-y-6">
            <div class="space-y-4">
                <input type="text" id="tiktokUrl" placeholder="Tempel link TikTok di sini..." 
                    class="cyber-input w-full rounded-2xl px-6 py-4 text-sm outline-none text-white placeholder:text-slate-600">
                
                <button id="btnAction" class="cyber-btn w-full text-slate-900 font-extrabold py-4 rounded-2xl text-sm tracking-wider uppercase">
                    Ambil Video
                </button>
            </div>
        </main>

        <div id="loader" class="hidden text-center">
            <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-cyan-500 border-r-transparent"></div>
            <p class="text-cyan-500 text-[10px] font-bold mt-4 tracking-widest uppercase">Processing TikWM...</p>
        </div>

        <section id="result" class="hidden glass-card p-6 rounded-[3rem] space-y-5 fade-up">
            <div class="relative rounded-2xl overflow-hidden border border-white/10">
                <img id="thumb" src="" class="w-full aspect-video object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent"></div>
            </div>
            
            <div class="px-2 space-y-1">
                <h3 id="author" class="text-cyan-400 font-bold text-lg"></h3>
                <p id="desc" class="text-slate-400 text-xs line-clamp-2 italic leading-relaxed"></p>
            </div>

            <a id="downloadLink" href="#" class="block w-full py-4 bg-white hover:bg-slate-200 text-slate-950 text-center font-extrabold rounded-2xl transition-all shadow-xl text-sm">
                DOWNLOAD NO WATERMARK
            </a>
        </section>

        <footer class="text-center pt-4">
            <p class="text-slate-800 text-[9px] font-bold tracking-[0.3em] uppercase">Built by Riksan &bull; CTO SawargiPay</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
