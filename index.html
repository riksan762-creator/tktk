<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SawargiPay v7.5 | Fintech Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: rgba(255, 255, 255, 0.9); --accent: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #eff6ff, #f8fafc); color: #1e293b; min-height: 100 screen; }
        .glass-card { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,1); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); border-radius: 28px; }
        .input-premium { background: white !important; border: 2px solid #f1f5f9 !important; border-radius: 16px !important; transition: 0.3s; }
        .input-premium:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
        .status-pill { font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        #login-overlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-overlay">
        <div class="glass-card p-10 w-full max-w-md text-center border-t-8 border-blue-600 shadow-2xl">
            <h1 class="text-3xl font-black tracking-tighter text-blue-600 italic mb-1">SAWAR<span class="text-slate-800 not-italic">GIPAY</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em] mb-8">Secure Access Portal</p>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full p-4 input-premium font-bold text-center">
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 input-premium font-bold text-center">
                <button onclick="checkAuth()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black tracking-widest shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">UNLOCK SYSTEM</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="max-w-6xl mx-auto hidden">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-black text-slate-800 italic tracking-tighter uppercase">Sawar<span class="text-blue-600">gipay</span></h1>
                <p id="clock" class="text-[10px] font-bold text-slate-400 tracking-[0.3em] uppercase mt-1"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportToExcel()" class="bg-emerald-500 text-white px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-600 transition-all shadow-lg shadow-emerald-100">Export Report</button>
                <button onclick="logout()" class="bg-white text-rose-500 px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest border border-rose-100 hover:bg-rose-50 transition-all">Exit</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="glass-card p-6">
                <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-2">Auto Gopay</p>
                <h2 id="disp-gopay" class="text-xl font-black text-slate-800">Rp 0</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-blue-500">
                <p class="text-blue-500 text-[9px] font-black uppercase tracking-widest mb-2">Tripay (Tersedia)</p>
                <h2 id="disp-tripay-ready" class="text-xl font-black text-slate-800">Rp 0</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-amber-400 bg-amber-50/30">
                <p class="text-amber-600 text-[9px] font-black uppercase tracking-widest mb-2">Tripay (Kliring)</p>
                <h2 id="disp-tripay-pending" class="text-xl font-black text-amber-700">Rp 0</h2>
            </div>
            <div class="glass-card p-6 bg-blue-600 border-none shadow-xl shadow-blue-100">
                <p class="text-blue-100 text-[9px] font-black uppercase tracking-widest mb-2">Total Net Liquidity</p>
                <h2 id="disp-total" class="text-xl font-black text-white italic">Rp 0</h2>
            </div>
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="glass-card p-8 sticky top-8">
                    <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-6">
                        <button id="m-up" onclick="setMode('UPDATE')" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-white text-blue-600 shadow-sm">Update</button>
                        <button id="m-wd" onclick="setMode('WD')" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-slate-400">Withdraw</button>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-1">Tanggal Transaksi</label>
                            <input type="date" id="in-date" class="w-full p-4 input-premium font-bold text-sm">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-1">Pilih Gateway</label>
                            <select id="in-gw" onchange="toggleKliring()" class="w-full p-4 input-premium font-bold text-sm">
                                <option value="Gopay">Auto Gopay</option>
                                <option value="Tripay Tersedia">Tripay Engine (Ready)</option>
                                <option value="Tripay Kliring">Tripay Engine (Kliring)</option>
                                <option value="Qiospay">Qiospay Gateway</option>
                            </select>
                        </div>
                        <div>
                            <label id="lbl-nom" class="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-1">Nominal Saldo</label>
                            <input type="text" id="in-nom" oninput="formatInput(this)" placeholder="0" class="w-full p-4 text-2xl input-premium font-black text-blue-600">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-1">Catatan</label>
                            <input type="text" id="in-note" placeholder="..." class="w-full p-4 input-premium font-medium text-sm">
                        </div>
                        <button id="btn-sub" onclick="process()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.3em] shadow-lg hover:scale-[1.02] transition-all mt-4">Simpan Laporan</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 flex flex-col">
                <div class="glass-card overflow-hidden flex flex-col bg-white min-h-[600px]">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 italic">Audit Ledger Trail</h3>
                        <button onclick="clearDB()" class="text-[10px] font-bold text-rose-400 hover:text-rose-600">Clear Records</button>
                    </div>
                    <div class="overflow-x-auto custom-scroll">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50/50 text-[9px] text-slate-400 uppercase font-black">
                                <tr>
                                    <th class="p-6">Timestamp</th>
                                    <th class="p-6">Status</th>
                                    <th class="p-6">Nominal</th>
                                    <th class="p-6 text-right">Method</th>
                                </tr>
                            </thead>
                            <tbody id="log-body" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const AUTH = { u: "sawargi@", p: "456" };
        let db = JSON.parse(localStorage.getItem('swg_ledger_v75')) || [];
        let mode = 'UPDATE';

        function checkAuth() {
            if(document.getElementById('user-input').value === AUTH.u && document.getElementById('pass-input').value === AUTH.p) {
                sessionStorage.setItem('swg_session', 'true');
                showDashboard();
            } else {
                alert("Akses Ditolak!");
            }
        }

        function showDashboard() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('in-date').valueAsDate = new Date();
            render();
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        function formatInput(el) {
            let v = el.value.replace(/\D/g, "");
            el.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function setMode(m) {
            mode = m;
            const up = document.getElementById('m-up');
            const wd = document.getElementById('m-wd');
            const btn = document.getElementById('btn-sub');
            if(m === 'UPDATE') {
                up.className = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-white text-blue-600 shadow-sm";
                wd.className = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-slate-400";
                btn.className = "w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.3em] shadow-lg transition-all mt-4";
            } else {
                wd.className = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-white text-rose-600 shadow-sm";
                up.className = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-slate-400";
                btn.className = "w-full bg-rose-500 text-white py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.3em] shadow-lg transition-all mt-4";
            }
        }

        function process() {
            const val = parseInt(document.getElementById('in-nom').value.replace(/\./g, "")) || 0;
            const gw = document.getElementById('in-gw').value;
            const note = document.getElementById('in-note').value || '-';
            const date = document.getElementById('in-date').value;

            if(!val || !date) return alert("Data tidak lengkap!");

            const entry = {
                id: Date.now(),
                mode, gw, val, note,
                date: date.split('-').reverse().join('/'),
                rawDate: date,
                time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
            };

            db.unshift(entry);
            db.sort((a,b) => new Date(b.rawDate) - new Date(a.rawDate) || b.id - a.id);
            localStorage.setItem('swg_ledger_v75', JSON.stringify(db));
            
            document.getElementById('in-nom').value = '';
            document.getElementById('in-note').value = '';
            render();
        }

        function render() {
            const body = document.getElementById('log-body');
            body.innerHTML = '';
            let bal = { Gopay: 0, "Tripay Tersedia": 0, "Tripay Kliring": 0, Qiospay: 0 };

            // Logic Saldo
            Object.keys(bal).forEach(k => {
                const logs = db.filter(i => i.gw === k).reverse();
                let current = 0;
                logs.forEach(i => {
                    if(i.mode === 'UPDATE') current = i.val;
                    else current -= i.val;
                });
                bal[k] = current;
            });

            document.getElementById('disp-gopay').innerText = "Rp " + bal.Gopay.toLocaleString('id-ID');
            document.getElementById('disp-tripay-ready').innerText = "Rp " + bal["Tripay Tersedia"].toLocaleString('id-ID');
            document.getElementById('disp-tripay-pending').innerText = "Rp " + bal["Tripay Kliring"].toLocaleString('id-ID');
            
            const total = bal.Gopay + bal["Tripay Tersedia"] + bal["Tripay Kliring"] + bal.Qiospay;
            document.getElementById('disp-total').innerText = "Rp " + total.toLocaleString('id-ID');

            db.forEach(item => {
                const isWD = item.mode === 'WD';
                const isKliring = item.gw.includes('Kliring');
                body.innerHTML += `
                    <tr class="hover:bg-slate-50/50 transition-all border-b border-slate-50">
                        <td class="p-6">
                            <p class="font-bold text-xs text-slate-800">${item.date}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">${item.time} WIB</p>
                        </td>
                        <td class="p-6">
                            <span class="status-pill ${isWD ? 'bg-rose-50 text-rose-500' : 'bg-blue-50 text-blue-500'}">
                                ${isWD ? 'WD' : 'UP'}
                            </span>
                        </td>
                        <td class="p-6">
                            <p class="font-black ${isWD ? 'text-rose-500' : 'text-slate-800'} text-sm italic">${isWD ? '-' : ''}Rp ${item.val.toLocaleString('id-ID')}</p>
                            <p class="text-[9px] text-slate-400 font-medium uppercase mt-1">${item.note}</p>
                        </td>
                        <td class="p-6 text-right">
                            <span class="text-[9px] font-black ${isKliring ? 'text-amber-600 bg-amber-50' : 'text-blue-600 bg-blue-50'} px-3 py-1.5 rounded-lg tracking-widest uppercase italic">${item.gw}</span>
                            <button onclick="del(${item.id})" class="ml-3 text-slate-300 hover:text-rose-500 transition-all">✕</button>
                        </td>
                    </tr>
                `;
            });
        }

        function del(id) {
            if(confirm("Hapus data?")) {
                db = db.filter(i => i.id !== id);
                localStorage.setItem('swg_ledger_v75', JSON.stringify(db));
                render();
            }
        }

        function clearDB() {
            if(confirm("Hapus semua?")) {
                db = []; localStorage.removeItem('swg_ledger_v75'); render();
            }
        }

        function exportToExcel() {
            if(db.length === 0) return alert("Kosong!");
            const exportData = db.map((i, index) => ({
                "NO": db.length - index,
                "TANGGAL": i.date,
                "WAKTU": i.time,
                "METODE": i.gw,
                "STATUS": i.mode === 'UPDATE' ? 'MASUK' : 'PENARIKAN',
                "NOMINAL": i.val,
                "NOTE": i.note
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, `SawargiPay_Report_${Date.now()}.xlsx`);
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }, 1000);

        window.onload = () => { if(sessionStorage.getItem('swg_session')) showDashboard(); };
    </script>
</body>
</html>
