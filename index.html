<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SawargiPay v8 | Ultra-Light Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfe; color: #1e293b; overflow-x: hidden; }
        .glass-card { background: #ffffff; border-radius: 20px; border: 1px solid #edf2f7; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .input-style { background: #f8fafc !important; border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; outline: none !important; transition: all 0.2s; }
        
        /* Dynamic Focus Colors */
        .focus-blue:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .focus-amber:focus { border-color: #f59e0b !important; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
        .focus-indigo:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        #login-screen { position: fixed; inset: 0; background: #fdfdfe; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        th { border-bottom: 2px solid #f1f5f9; }
        td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-10">

    <div id="login-screen">
        <div class="glass-card p-8 w-full max-w-sm text-center">
            <div class="mb-6">
                <h1 class="text-3xl font-black italic tracking-tighter text-blue-600 uppercase">SAWAR<span class="text-slate-800">GIPAY</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-1">Management System v8.0</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="Username" class="w-full p-4 input-style font-semibold text-center focus-blue">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 input-style font-semibold text-center focus-blue">
                <button onclick="handleLogin()" class="w-full btn-primary text-white py-4 rounded-xl font-bold tracking-widest uppercase text-sm shadow-lg shadow-blue-100">Login Access</button>
            </div>
            <p id="err" class="text-rose-500 text-[10px] mt-4 font-bold uppercase hidden italic">Akses Ditolak: Cek Username/Password</p>
        </div>
    </div>

    <div id="dashboard" class="max-w-6xl mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-black italic text-slate-800 tracking-tighter uppercase">SAWAR<span class="text-blue-600">GIPAY</span></h1>
                <p id="clock" class="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadExcel()" class="bg-emerald-500 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-600 transition-all shadow-md shadow-emerald-50">Download Excel</button>
                <button onclick="handleLogout()" class="bg-slate-100 text-slate-500 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-rose-50 hover:text-rose-500 transition-all">Logout</button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-5 border-l-4 border-blue-500">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Gopay</span>
                <h3 id="bal-gopay" class="text-xl font-black text-slate-800 mt-1">Rp 0</h3>
            </div>
            <div class="glass-card p-5 border-l-4 border-indigo-500 bg-indigo-50/10">
                <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest">Tripay Tersedia</span>
                <h3 id="bal-tr" class="text-xl font-black text-indigo-900 mt-1">Rp 0</h3>
            </div>
            <div class="glass-card p-5 border-l-4 border-amber-500 bg-amber-50/20">
                <span class="text-[9px] font-bold text-amber-600 uppercase tracking-widest">Tripay Kliring</span>
                <h3 id="bal-tk" class="text-xl font-black text-amber-700 mt-1">Rp 0</h3>
            </div>
            <div class="glass-card p-5 bg-slate-900 border-none">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Total Net Asset</span>
                <h3 id="bal-total" class="text-xl font-black text-white italic mt-1">Rp 0</h3>
            </div>
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="glass-card p-6 space-y-4 sticky top-6" id="entry-card">
                    <h2 class="text-xs font-black uppercase text-slate-400 mb-2 tracking-widest">Entry Data</h2>
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button id="mode-up" onclick="changeMode('UPDATE')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase bg-white text-blue-600 shadow-sm transition-all">Update</button>
                        <button id="mode-wd" onclick="changeMode('WD')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-400 transition-all">Withdraw</button>
                    </div>
                    <input type="date" id="f-date" class="w-full p-3.5 input-style font-bold text-sm focus-blue">
                    
                    <select id="f-gw" onchange="updateInputTheme()" class="w-full p-3.5 input-style font-bold text-sm appearance-none focus-blue">
                        <option value="Gopay">Auto Gopay</option>
                        <option value="Tripay Tersedia">Tripay Engine (Tersedia)</option>
                        <option value="Tripay Kliring">Tripay Engine (Kliring)</option>
                        <option value="Qiospay">Qiospay Gateway</option>
                    </select>

                    <input type="text" id="f-nom" oninput="formatRupiah(this)" placeholder="Nominal Rp" class="w-full p-4 text-xl input-style font-black text-blue-600 focus-blue">
                    <input type="text" id="f-note" placeholder="Catatan/Keterangan..." class="w-full p-3.5 input-style text-sm focus-blue">
                    
                    <button onclick="saveData()" id="btn-save" class="w-full btn-primary text-white py-4 rounded-xl font-bold text-[11px] uppercase tracking-[0.2em] shadow-lg">Simpan Laporan</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card overflow-hidden min-h-[500px]">
                    <div class="p-5 border-b flex justify-between items-center bg-slate-50/30">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">History Ledger</span>
                        <button onclick="clearAll()" class="text-[10px] font-bold text-rose-300 hover:text-rose-500 uppercase transition-all">Clear All</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left table-fixed">
                            <thead class="bg-white">
                                <tr class="text-[9px] text-slate-400 uppercase font-black">
                                    <th class="p-5 w-32">Waktu</th>
                                    <th class="p-5 w-20">Aksi</th>
                                    <th class="p-5">Nominal & Info</th>
                                    <th class="p-5 w-32 text-right">Gateway</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('swg_v8')) || [];
        let currentMode = 'UPDATE';

        // --- AUTH LOGIC ---
        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "sawargi@" && p === "456") {
                sessionStorage.setItem('isAuth', 'true');
                checkSession();
            } else {
                const err = document.getElementById('err');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }

        function checkSession() {
            if(sessionStorage.getItem('isAuth') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('f-date').valueAsDate = new Date();
                refreshUI();
            }
        }

        function handleLogout() {
            sessionStorage.clear();
            location.reload();
        }

        // --- THEME LOGIC ---
        function updateInputTheme() {
            const gw = document.getElementById('f-gw').value;
            const inputs = ['f-date', 'f-gw', 'f-nom', 'f-note'];
            const nomInput = document.getElementById('f-nom');
            
            inputs.forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('focus-blue', 'focus-amber', 'focus-indigo');
                
                if(gw === 'Tripay Kliring') {
                    el.classList.add('focus-amber');
                    nomInput.style.color = "#b45309"; // Amber-700
                } else if(gw === 'Tripay Tersedia') {
                    el.classList.add('focus-indigo');
                    nomInput.style.color = "#4338ca"; // Indigo-700
                } else {
                    el.classList.add('focus-blue');
                    nomInput.style.color = "#2563eb"; // Blue-600
                }
            });
        }

        // --- CORE LOGIC ---
        function formatRupiah(el) {
            let v = el.value.replace(/\D/g, "");
            el.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function changeMode(m) {
            currentMode = m;
            const up = document.getElementById('mode-up');
            const wd = document.getElementById('mode-wd');
            const btn = document.getElementById('btn-save');
            
            if(m === 'UPDATE') {
                up.className = "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase bg-white text-blue-600 shadow-sm";
                wd.className = "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-400";
                btn.className = "w-full btn-primary text-white py-4 rounded-xl font-bold text-[11px] uppercase tracking-[0.2em] shadow-lg";
                btn.innerText = "Simpan Laporan";
            } else {
                wd.className = "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase bg-white text-rose-600 shadow-sm";
                up.className = "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-400";
                btn.className = "w-full bg-rose-500 text-white py-4 rounded-xl font-bold text-[11px] uppercase tracking-[0.2em] shadow-lg";
                btn.innerText = "Konfirmasi Penarikan";
            }
        }

        function saveData() {
            const nom = parseInt(document.getElementById('f-nom').value.replace(/\./g, "")) || 0;
            const date = document.getElementById('f-date').value;
            const gw = document.getElementById('f-gw').value;
            const note = document.getElementById('f-note').value || '-';

            if(!nom || !date) return alert("Mohon lengkapi nominal dan tanggal!");

            const payload = {
                id: Date.now(),
                mode: currentMode,
                gw, nom, note,
                date: date.split('-').reverse().join('/'),
                rawDate: date,
                monthName: new Date(date).toLocaleString('id-ID', { month: 'long' }),
                yearName: new Date(date).getFullYear(),
                time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
            };

            db.unshift(payload);
            db.sort((a,b) => new Date(b.rawDate) - new Date(a.rawDate) || b.id - a.id);
            localStorage.setItem('swg_v8', JSON.stringify(db));
            
            document.getElementById('f-nom').value = '';
            document.getElementById('f-note').value = '';
            refreshUI();
        }

        function refreshUI() {
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            let balances = { "Gopay": 0, "Tripay Tersedia": 0, "Tripay Kliring": 0, "Qiospay": 0 };

            Object.keys(balances).forEach(key => {
                const filtered = db.filter(i => i.gw === key).reverse();
                let current = 0;
                filtered.forEach(item => {
                    if(item.mode === 'UPDATE') current = item.nom;
                    else current -= item.nom;
                });
                balances[key] = current;
            });

            document.getElementById('bal-gopay').innerText = "Rp " + balances["Gopay"].toLocaleString('id-ID');
            document.getElementById('bal-tr').innerText = "Rp " + balances["Tripay Tersedia"].toLocaleString('id-ID');
            document.getElementById('bal-tk').innerText = "Rp " + balances["Tripay Kliring"].toLocaleString('id-ID');
            const total = Object.values(balances).reduce((a, b) => a + b, 0);
            document.getElementById('bal-total').innerText = "Rp " + total.toLocaleString('id-ID');

            db.forEach(item => {
                const isWD = item.mode === 'WD';
                let gwColor = "text-blue-600";
                if(item.gw === "Tripay Kliring") gwColor = "text-amber-600";
                if(item.gw === "Tripay Tersedia") gwColor = "text-indigo-600";

                body.innerHTML += `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-5 font-bold text-xs">
                        ${item.date}<br>
                        <span class="text-[9px] text-slate-400 font-medium">${item.time} WIB</span>
                    </td>
                    <td class="p-5 text-center">
                        <span class="px-2 py-1 rounded-md text-[8px] font-black tracking-tighter ${isWD ? 'bg-rose-50 text-rose-500 border border-rose-100' : 'bg-blue-50 text-blue-500 border border-blue-100'}">
                            ${item.mode}
                        </span>
                    </td>
                    <td class="p-5">
                        <p class="font-black italic text-sm ${isWD ? 'text-rose-500' : 'text-slate-800'}">
                            ${isWD ? '-' : ''}Rp ${item.nom.toLocaleString('id-ID')}
                        </p>
                        <p class="text-[9px] text-slate-400 uppercase font-medium truncate max-w-[150px]">${item.note}</p>
                    </td>
                    <td class="p-5 text-right font-black text-[9px] ${gwColor} uppercase italic">
                        ${item.gw}
                        <button onclick="removeItem(${item.id})" class="ml-3 text-slate-300 hover:text-rose-500 transition-colors">✕</button>
                    </td>
                </tr>`;
            });
        }

        function removeItem(id) {
            if(confirm("Hapus baris ini?")) {
                db = db.filter(i => i.id !== id);
                localStorage.setItem('swg_v8', JSON.stringify(db));
                refreshUI();
            }
        }

        function clearAll() {
            if(confirm("Hapus SEMUA data ledger? Tindakan ini tidak bisa dibatalkan.")) {
                db = []; localStorage.removeItem('swg_v8'); refreshUI();
            }
        }

        // --- EXCEL EXPORT WITH SMART NAMING ---
        function downloadExcel() {
            if(db.length === 0) return alert("Belum ada data untuk diekspor!");
            
            // Ambil info bulan & tahun dari data terbaru atau hari ini
            const latestData = db[0];
            const fileNameDate = latestData.monthName + "_" + latestData.yearName;

            const dataExcel = db.map((i, idx) => ({
                "NO": db.length - idx,
                "TANGGAL": i.date,
                "JAM": i.time,
                "GATEWAY": i.gw,
                "AKSI": i.mode === 'UPDATE' ? "MASUK/SALDO" : "PENARIKAN",
                "NOMINAL": i.nom,
                "CATATAN": i.note
            }));

            const ws = XLSX.utils.json_to_sheet(dataExcel);
            ws['!cols'] = [{wch: 5}, {wch: 15}, {wch: 10}, {wch: 25}, {wch: 15}, {wch: 20}, {wch: 35}];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "SawargiPay_Ledger");
            
            // Nama file dinamis berdasarkan bulan dan tahun
            XLSX.writeFile(wb, `Laporan_SawargiPay_${fileNameDate}.xlsx`);
        }

        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').innerText = n.toLocaleString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }, 1000);

        window.onload = checkSession;
    </script>
</body>
</html>
