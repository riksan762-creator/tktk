<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SawargiPay v12 | Structural Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; margin: 0; }
        .card { background: #ffffff; border-radius: 20px; border: 1px solid #eef2f6; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .input-box { background: #fcfdfe !important; border: 2px solid #f1f5f9 !important; border-radius: 12px !important; outline: none !important; transition: 0.2s; width: 100%; }
        .input-box:focus { border-color: #2563eb !important; background: #ffffff !important; }
        #login-page { position: fixed; inset: 0; z-index: 9999; background: #f8fafc; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { min-width: 700px; width: 100%; border-collapse: collapse; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .sticky-header { position: sticky; top: 0; background: white; z-index: 10; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-page">
        <div class="card p-8 md:p-12 w-full max-w-sm text-center shadow-2xl">
            <div class="mb-8">
                <h1 class="text-3xl font-black italic tracking-tighter text-blue-600 uppercase">SAWAR<span class="text-slate-800">GIPAY</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Executive System v12.0</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="u_name" placeholder="Username" class="p-4 input-box font-bold text-center uppercase tracking-widest text-sm">
                <input type="password" id="u_pass" placeholder="Password" class="p-4 input-box font-bold text-center tracking-widest text-sm">
                <button onclick="doAuth()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black tracking-widest uppercase hover:bg-blue-600 transition-all">Sign In</button>
            </div>
            <p id="err-msg" class="text-rose-500 text-[10px] mt-6 font-bold hidden italic uppercase">Akses Ditolak: Cek Username/Password</p>
        </div>
    </div>

    <div id="dashboard" class="max-w-7xl mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-black italic text-slate-800 tracking-tighter uppercase">SAWAR<span class="text-blue-600">GIPAY</span></h1>
                <p id="real-time" class="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase mt-1"></p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button onclick="downloadExcel()" class="flex-1 md:flex-none bg-emerald-500 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-emerald-50 hover:bg-emerald-600 transition-all">Download XLS</button>
                <button onclick="logout()" class="bg-white text-slate-400 px-6 py-3 rounded-xl text-[10px] font-black uppercase border border-slate-200 hover:text-rose-500 transition-all">Logout</button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="card p-6 border-l-4 border-blue-500">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Gopay Balance</p>
                <h2 id="v-gopay" class="text-2xl font-black text-slate-800 mt-1">Rp 0</h2>
            </div>
            <div class="card p-6 border-l-4 border-emerald-500">
                <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest">Tripay Ready</p>
                <h2 id="v-tr" class="text-2xl font-black text-slate-800 mt-1">Rp 0</h2>
            </div>
            <div class="card p-6 border-l-4 border-amber-500 bg-amber-50/20">
                <p class="text-[9px] font-black text-amber-600 uppercase tracking-widest">Tripay Kliring</p>
                <h2 id="v-tk" class="text-2xl font-black text-amber-700 mt-1">Rp 0</h2>
            </div>
            <div class="card p-6 bg-slate-900 border-none shadow-xl shadow-slate-200">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total Net Liquidity</p>
                <h2 id="v-total" class="text-2xl font-black text-white italic mt-1">Rp 0</h2>
            </div>
        </div>

        <div class="grid lg:grid-cols-12 gap-8 items-start">
            <div class="lg:col-span-4 w-full">
                <div class="card p-6 md:p-8 space-y-5">
                    <h3 class="text-xs font-black uppercase text-slate-400 tracking-widest border-b pb-4">Transaction Entry</h3>
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button id="btn-up" onclick="setMode('UPDATE')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black bg-white text-blue-600 shadow-sm">IN (UPDATE)</button>
                        <button id="btn-wd" onclick="setMode('WD')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black text-slate-400">OUT (WD)</button>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Tanggal</label>
                            <input type="date" id="in-date" class="p-3.5 input-box font-bold text-sm">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Gateway</label>
                            <select id="in-gw" class="p-3.5 input-box font-bold text-sm appearance-none cursor-pointer">
                                <option value="GOPAY">Gopay Auto</option>
                                <option value="TRIPAY TERSEDIA">Tripay Tersedia</option>
                                <option value="TRIPAY KLIRING">Tripay Kliring</option>
                                <option value="QIOSPAY">Qiospay Gateway</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Nominal (IDR)</label>
                            <input type="text" id="in-nom" oninput="fmtCur(this)" placeholder="0" class="p-4 text-2xl input-box font-black text-blue-600">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Keterangan</label>
                            <input type="text" id="in-note" placeholder="Contoh: Saldo harian..." class="p-3.5 input-box text-sm font-medium">
                        </div>
                        <button onclick="saveRecord()" id="submit-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-xs tracking-[0.3em] uppercase shadow-lg shadow-blue-100 transition-all hover:bg-blue-700 active:scale-95 mt-2">Submit Record</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 w-full">
                <div class="card overflow-hidden">
                    <div class="p-5 border-b flex justify-between items-center bg-slate-50/30">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mutation History Ledger</span>
                        <button onclick="resetData()" class="text-[9px] font-bold text-rose-300 hover:text-rose-500 uppercase tracking-tighter transition-colors">Clear All History</button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead class="bg-white">
                                <tr class="text-[9px] text-slate-400 uppercase font-black">
                                    <th class="w-32 sticky-header">Date & Time</th>
                                    <th class="w-24 text-center sticky-header">Type</th>
                                    <th class="sticky-header">Nominal & Note</th>
                                    <th class="w-32 text-right sticky-header">Gateway</th>
                                </tr>
                            </thead>
                            <tbody id="ledger-body" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('sawargi_v12_db')) || [];
        let activeMode = 'UPDATE';

        // --- AUTH ---
        function doAuth() {
            const u = document.getElementById('u_name').value.toLowerCase();
            const p = document.getElementById('u_pass').value;
            if(u === "sawargi@" && p === "456") {
                sessionStorage.setItem('swg_v12_auth', 'ok');
                checkStatus();
            } else {
                document.getElementById('err-msg').classList.remove('hidden');
                setTimeout(() => document.getElementById('err-msg').classList.add('hidden'), 2000);
            }
        }

        function checkStatus() {
            if(sessionStorage.getItem('swg_v12_auth') === 'ok') {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('in-date').valueAsDate = new Date();
                render();
            }
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        // --- CORE ---
        function fmtCur(e) {
            let v = e.value.replace(/\D/g, "");
            e.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function setMode(m) {
            activeMode = m;
            document.getElementById('btn-up').className = m === 'UPDATE' ? "flex-1 py-2.5 rounded-lg text-[10px] font-black bg-white text-blue-600 shadow-sm" : "flex-1 py-2.5 rounded-lg text-[10px] font-black text-slate-400";
            document.getElementById('btn-wd').className = m === 'WD' ? "flex-1 py-2.5 rounded-lg text-[10px] font-black bg-white text-rose-600 shadow-sm" : "flex-1 py-2.5 rounded-lg text-[10px] font-black text-slate-400";
            document.getElementById('submit-btn').className = m === 'UPDATE' ? "w-full bg-blue-600 text-white py-4 rounded-xl font-black text-xs tracking-[0.3em] uppercase shadow-lg shadow-blue-100 mt-2" : "w-full bg-rose-500 text-white py-4 rounded-xl font-black text-xs tracking-[0.3em] uppercase shadow-lg shadow-rose-100 mt-2";
        }

        function saveRecord() {
            const nom = parseInt(document.getElementById('in-nom').value.replace(/\./g, "")) || 0;
            const tgl = document.getElementById('in-date').value;
            const gw = document.getElementById('in-gw').value;
            const note = document.getElementById('in-note').value || '-';

            if(!nom || !tgl) return alert("Nominal dan Tanggal harus diisi!");

            db.unshift({
                id: Date.now(), mode: activeMode, gw, nom, note,
                d: tgl.split('-').reverse().join('/'),
                raw: tgl,
                t: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
            });

            db.sort((a,b) => new Date(b.raw) - new Date(a.raw) || b.id - a.id);
            localStorage.setItem('sawargi_v12_db', JSON.stringify(db));
            document.getElementById('in-nom').value = '';
            document.getElementById('in-note').value = '';
            render();
        }

        function render() {
            const list = document.getElementById('ledger-body'); list.innerHTML = '';
            let bal = { "GOPAY": 0, "TRIPAY TERSEDIA": 0, "TRIPAY KLIRING": 0, "QIOSPAY": 0 };

            Object.keys(bal).forEach(k => {
                db.filter(i => i.gw === k).reverse().forEach(i => bal[k] = i.mode === 'UPDATE' ? i.nom : bal[k] - i.nom);
            });

            document.getElementById('v-gopay').innerText = "Rp " + bal.GOPAY.toLocaleString('id-ID');
            document.getElementById('v-tr').innerText = "Rp " + bal["TRIPAY TERSEDIA"].toLocaleString('id-ID');
            document.getElementById('v-tk').innerText = "Rp " + bal["TRIPAY KLIRING"].toLocaleString('id-ID');
            document.getElementById('v-total').innerText = "Rp " + Object.values(bal).reduce((a,b) => a+b, 0).toLocaleString('id-ID');

            db.forEach(i => {
                const isWD = i.mode === 'WD';
                list.innerHTML += `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="font-bold text-xs">${i.d}<br><span class="text-[9px] text-slate-300 font-medium uppercase">${i.t} WIB</span></td>
                    <td class="text-center">
                        <span class="px-2 py-1 rounded text-[8px] font-black ${isWD ? 'bg-rose-50 text-rose-500 border border-rose-100' : 'bg-blue-50 text-blue-500 border border-blue-100'} uppercase">${i.mode}</span>
                    </td>
                    <td>
                        <p class="font-black italic text-sm ${isWD ? 'text-rose-500' : 'text-slate-800'}">${isWD ? '-' : ''}Rp ${i.nom.toLocaleString('id-ID')}</p>
                        <p class="text-[10px] text-slate-400 font-medium uppercase truncate max-w-[200px]">${i.note}</p>
                    </td>
                    <td class="text-right font-black text-[10px] ${i.gw.includes('KLIRING') ? 'text-amber-500' : 'text-blue-600'} italic">
                        ${i.gw}
                        <button onclick="delItem(${i.id})" class="ml-4 text-slate-200 hover:text-rose-500 transition-all text-sm">✕</button>
                    </td>
                </tr>`;
            });
        }

        function delItem(id) { if(confirm("Hapus baris ini?")) { db = db.filter(i => i.id !== id); localStorage.setItem('sawargi_v12_db', JSON.stringify(db)); render(); } }
        function resetData() { if(confirm("HAPUS SEMUA DATA?")) { db = []; localStorage.removeItem('sawargi_v12_db'); render(); } }

        // --- EXCEL ---
        function downloadExcel() {
            if(db.length === 0) return alert("Belum ada data!");
            const d = new Date();
            const fn = `SAWARGIPAY_${d.getDate()}_${d.getMonth()+1}_${d.getFullYear()}.xlsx`;
            
            const excelRows = db.map((i, idx) => ({
                "NO": db.length - idx,
                "TANGGAL": i.d,
                "WAKTU": i.t,
                "METODE": i.gw,
                "JENIS": i.mode,
                "NOMINAL": i.nom,
                "CATATAN": i.note
            }));

            const ws = XLSX.utils.json_to_sheet(excelRows);
            const range = XLSX.utils.decode_range(ws['!ref']);
            for(let R = range.s.r + 1; R <= range.e.r; ++R) {
                const cell = ws[XLSX.utils.encode_cell({r:R, c:5})];
                if(cell) cell.t = 'n';
            }

            ws['!cols'] = [{wch:5}, {wch:15}, {wch:10}, {wch:25}, {wch:15}, {wch:20}, {wch:40}];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Financial_Report");
            XLSX.writeFile(wb, fn);
        }

        setInterval(() => {
            document.getElementById('real-time').innerText = new Date().toLocaleString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }, 1000);

        window.onload = checkStatus;
    </script>
</body>
</html>
