<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SawargiPay v21.0 | Platinum Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfe; color: #1e293b; }
        .glass-card { background: #ffffff; border-radius: 20px; border: 1px solid #edf2f7; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .input-style { background: #f8fafc !important; border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; outline: none !important; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        #login-screen { position: fixed; inset: 0; background: #fdfdfe; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        /* Warna Gateway */
        .badge-gopay { background: #e0f2fe; color: #0369a1; }
        .badge-tripay { background: #fef3c7; color: #b45309; }
        .badge-kliring { background: #f3e8ff; color: #7e22ce; }
    </style>
</head>
<body class="p-4">

    <div id="login-screen">
        <div class="glass-card p-8 w-full max-w-sm text-center">
            <h1 class="text-3xl font-black italic text-blue-600 uppercase mb-6">SAWAR<span class="text-slate-800">GIPAY</span></h1>
            <input type="password" id="pass" placeholder="PIN AKSES" class="w-full p-4 input-style font-semibold text-center mb-4">
            <button onclick="handleLogin()" class="w-full btn-primary text-white py-4 rounded-xl font-bold uppercase shadow-lg">Masuk Sistem</button>
        </div>
    </div>

    <div id="dashboard" class="max-w-6xl mx-auto hidden pt-4">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black italic text-slate-800 uppercase">SAWAR<span class="text-blue-600">GIPAY</span></h1>
            <button onclick="handleLogout()" class="bg-slate-100 text-slate-400 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Logout</button>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="glass-card p-6 space-y-4 sticky top-6">
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button id="mode-up" onclick="changeMode('UPDATE')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase bg-white text-blue-600 shadow-sm">Update</button>
                        <button id="mode-wd" onclick="changeMode('WD')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-400">Withdraw</button>
                    </div>
                    
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Tanggal & Gateway</label>
                    <input type="date" id="f-date" class="w-full p-3.5 input-style font-bold text-sm">
                    
                    <select id="f-gw" class="w-full p-3.5 input-style font-bold text-sm">
                        <option value="AutoGopay">AutoGopay</option>
                        <option value="Tripay (Saldo)">Tripay (Saldo)</option>
                        <option value="Kliring Bank">Kliring Bank</option>
                    </select>

                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nominal Transaksi</label>
                    <input type="text" id="f-nom" oninput="formatRupiah(this)" placeholder="Rp 0" class="w-full p-4 text-2xl input-style font-black text-blue-600 text-center">
                    
                    <button onclick="saveData()" id="btn-save" class="w-full btn-primary text-white py-4 rounded-xl font-bold uppercase shadow-lg">Simpan Ke Cloud</button>
                    <button onclick="downloadXLS()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold text-[10px] uppercase shadow-md mt-2">Download Laporan (XLS)</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card overflow-hidden">
                    <div class="p-5 border-b bg-slate-50/50 flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Live Transaction Ledger</span>
                        <button onclick="fetchCloudData()" class="text-blue-500 text-[10px] font-bold">REFRESH ↻</button>
                    </div>
                    <div class="overflow-x-auto min-h-[500px]">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase border-b bg-slate-50">
                                    <th class="p-4">Waktu</th>
                                    <th class="p-4">Status</th>
                                    <th class="p-4">Nominal</th>
                                    <th class="p-4">Gateway</th>
                                    <th class="p-4 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FB_URL = "https://sawargipay-abe05-default-rtdb.asia-southeast1.firebasedatabase.app/secret/ledger";
        const KEY = "456";
        let currentMode = 'UPDATE';
        let rawData = [];

        function handleLogin() {
            if(document.getElementById('pass').value === KEY) {
                sessionStorage.setItem('isAuth', 'true');
                checkSession();
            } else { alert("PIN SALAH, PAK RIKSAN!"); }
        }

        function checkSession() {
            if(sessionStorage.getItem('isAuth') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('f-date').valueAsDate = new Date();
                fetchCloudData();
            }
        }

        async function fetchCloudData() {
            const body = document.getElementById('table-body');
            try {
                const res = await fetch(`${FB_URL}.json`);
                const data = await res.json();
                body.innerHTML = '';
                rawData = [];
                
                if(!data) {
                    body.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-xs text-slate-300 italic">Belum ada data masuk.</td></tr>';
                    return;
                }

                // Sorting: AutoGopay di atas, sisanya berdasarkan ID terbaru
                const list = Object.keys(data).map(key => ({...data[key], fbKey: key}));
                rawData = list;

                list.sort((a, b) => {
                    if (a.gw === 'AutoGopay' && b.gw !== 'AutoGopay') return -1;
                    if (a.gw !== 'AutoGopay' && b.gw === 'AutoGopay') return 1;
                    return b.id - a.id;
                });

                list.forEach(item => {
                    const isWD = item.mode === 'WD';
                    const nominal = parseInt(item.nom || 0);
                    
                    let gwClass = 'badge-kliring';
                    if(item.gw === 'AutoGopay') gwClass = 'badge-gopay';
                    if(item.gw.includes('Tripay')) gwClass = 'badge-tripay';

                    body.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-bold text-[11px]">${item.date}<br><span class="text-slate-300 font-normal uppercase">${item.time} WIB</span></td>
                        <td class="p-4"><span class="px-2 py-0.5 rounded text-[8px] font-black ${isWD ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-blue-500'}">${item.mode}</span></td>
                        <td class="p-4 font-black text-sm ${isWD ? 'text-red-500' : 'text-slate-800'}">Rp ${nominal.toLocaleString('id-ID')}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded-md text-[9px] font-black uppercase ${gwClass}">${item.gw}</span></td>
                        <td class="p-4 text-center">
                            <button onclick="deleteData('${item.fbKey}')" class="text-rose-400 hover:text-rose-600 font-bold text-[10px]">HAPUS</button>
                        </td>
                    </tr>`;
                });
            } catch (e) { body.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-500 text-xs">Gagal Load Database!</td></tr>'; }
        }

        async function saveData() {
            const nomRaw = document.getElementById('f-nom').value;
            const nom = parseInt(nomRaw.replace(/\./g, "")) || 0;
            if(!nom) return alert("Masukkan nominal dulu!");

            const btn = document.getElementById('btn-save');
            btn.disabled = true; btn.innerText = "SINKRONISASI...";

            const payload = {
                id: Date.now(),
                mode: currentMode,
                gw: document.getElementById('f-gw').value,
                nom: nom,
                date: document.getElementById('f-date').value.split('-').reverse().join('/'),
                time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace('.', ':')
            };

            try {
                const res = await fetch(`${FB_URL}/${payload.id}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    document.getElementById('f-nom').value = '';
                    fetchCloudData();
                }
            } catch (e) { alert("Gagal Simpan!"); }
            btn.disabled = false; btn.innerText = "Simpan Ke Cloud";
        }

        async function deleteData(key) {
            if(!confirm("Hapus data ini secara permanen?")) return;
            try {
                await fetch(`${FB_URL}/${key}.json`, { method: 'DELETE' });
                fetchCloudData();
            } catch (e) { alert("Gagal Hapus!"); }
        }

        function downloadXLS() {
            if(rawData.length === 0) return alert("Data kosong!");
            const exportData = rawData.map(item => ({
                Tanggal: item.date,
                Waktu: item.time,
                Mode: item.mode,
                Nominal: item.nom,
                Gateway: item.gw
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, `SawargiPay_Report_${new Date().getTime()}.xlsx`);
        }

        function formatRupiah(el) {
            let v = el.value.replace(/\D/g, "");
            el.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('mode-up').className = m === 'UPDATE' ? "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase bg-white text-blue-600 shadow-sm" : "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-400";
            document.getElementById('mode-wd').className = m === 'WD' ? "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase bg-white text-red-600 shadow-sm" : "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-400";
        }

        function handleLogout() { sessionStorage.clear(); location.reload(); }
        window.onload = checkSession;
    </script>
</body>
</html>
