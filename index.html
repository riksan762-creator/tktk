<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SawargiPay v10.7 | Secure Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfe; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: #ffffff; border-radius: 20px; border: 1px solid #edf2f7; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .input-style { background: #f8fafc !important; border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; outline: none !important; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: 0.2s; }
        #login-screen { position: fixed; inset: 0; background: #fdfdfe; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="login-screen">
        <div class="glass-card p-8 w-full max-w-sm text-center">
            <h1 class="text-3xl font-black italic text-blue-600 uppercase mb-6">SAWAR<span class="text-slate-800">GIPAY</span></h1>
            <input type="password" id="pass" placeholder="PIN Akses" class="w-full p-4 input-style font-semibold text-center mb-4">
            <button onclick="handleLogin()" class="w-full btn-primary text-white py-4 rounded-xl font-bold uppercase shadow-lg">Login</button>
        </div>
    </div>

    <div id="dashboard" class="max-w-6xl mx-auto hidden">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black italic text-slate-800 uppercase">SAWAR<span class="text-blue-600">GIPAY</span></h1>
            <button onclick="handleLogout()" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Logout</button>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="glass-card p-6 space-y-4">
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button id="mode-up" onclick="changeMode('UPDATE')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase bg-white text-blue-600 shadow-sm">Update</button>
                        <button id="mode-wd" onclick="changeMode('WD')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-400">Withdraw</button>
                    </div>
                    <input type="date" id="f-date" class="w-full p-3.5 input-style font-bold text-sm">
                    <select id="f-gw" class="w-full p-3.5 input-style font-bold text-sm">
                        <option value="Gopay">Auto Gopay</option>
                        <option value="Tripay Tersedia">Tripay (Tersedia)</option>
                        <option value="Qiospay">Qiospay Gateway</option>
                    </select>
                    <input type="text" id="f-nom" oninput="formatRupiah(this)" placeholder="Nominal Rp" class="w-full p-4 text-2xl input-style font-black text-blue-600">
                    <button onclick="saveData()" id="btn-save" class="w-full btn-primary text-white py-4 rounded-xl font-bold uppercase shadow-lg">SIMPAN & SINKRON</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card min-h-[400px]">
                    <div class="p-5 border-b bg-slate-50/50 flex justify-between">
                        <span class="text-[10px] font-black text-slate-400 uppercase">History Live</span>
                        <button onclick="fetchCloudData()" class="text-blue-500 text-[10px] font-bold">REFRESH</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FB_URL = "https://sawargipay-abe05-default-rtdb.asia-southeast1.firebasedatabase.app/secret";
        const KEY = "456"; // Ini adalah kunci pembuka pintu rules
        let currentMode = 'UPDATE';

        function handleLogin() {
            if(document.getElementById('pass').value === KEY) {
                sessionStorage.setItem('isAuth', 'true');
                checkSession();
            } else { alert("PIN Salah!"); }
        }

        function checkSession() {
            if(sessionStorage.getItem('isAuth') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('f-date').valueAsDate = new Date();
                fetchCloudData();
            }
        }

        async function fetchCloudData() {
            try {
                // Menambahkan auth=KEY agar diizinkan oleh Rules
                const res = await fetch(`${FB_URL}/ledger.json?auth=${KEY}`);
                const data = await res.json();
                const db = data ? Object.values(data) : [];
                db.sort((a,b) => b.id - a.id);
                
                const body = document.getElementById('table-body');
                body.innerHTML = '';
                db.forEach(item => {
                    const isWD = item.mode === 'WD';
                    body.innerHTML += `
                    <tr>
                        <td class="p-5 font-bold text-[11px]">${item.date}<br><span class="text-slate-300 font-normal">${item.time}</span></td>
                        <td class="p-5 font-black text-sm ${isWD ? 'text-red-500' : 'text-slate-800'}">Rp ${parseInt(item.nom).toLocaleString('id-ID')}</td>
                        <td class="p-5 text-right font-black text-[9px] text-blue-600 uppercase">${item.gw}</td>
                    </tr>`;
                });
            } catch (e) { console.error("Gagal ambil data."); }
        }

        async function saveData() {
            const nomRaw = document.getElementById('f-nom').value;
            const nom = parseInt(nomRaw.replace(/\./g, "")) || 0;
            if(!nom) return alert("Nominal!");

            const btn = document.getElementById('btn-save');
            btn.disabled = true; btn.innerText = "SINKRON...";

            const payload = {
                id: Date.now(),
                mode: currentMode,
                gw: document.getElementById('f-gw').value,
                nom: nom,
                date: document.getElementById('f-date').value.split('-').reverse().join('/'),
                time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace('.', ':')
            };

            try {
                // Simpan wajib pakai auth=KEY
                await fetch(`${FB_URL}/ledger/${payload.id}.json?auth=${KEY}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });
                document.getElementById('f-nom').value = '';
                setTimeout(fetchCloudData, 800);
            } catch (e) { alert("Gagal Simpan!"); }
            btn.disabled = false; btn.innerText = "SIMPAN & SINKRON";
        }

        function formatRupiah(el) {
            let v = el.value.replace(/\D/g, "");
            el.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('mode-up').className = m === 'UPDATE' ? "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase bg-white text-blue-600 shadow-sm" : "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-400";
            document.getElementById('mode-wd').className = m === 'WD' ? "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase bg-white text-red-600 shadow-sm" : "flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-400";
        }

        function handleLogout() { sessionStorage.clear(); location.reload(); }
        window.onload = checkSession;
    </script>
</body>
</html>
